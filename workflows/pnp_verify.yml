name: PNP Verify

on:
  push:
    paths:
      - ".agentos/pnp/solution_pool/**"
      - ".agentos/pnp/problem_registry.json"
      - ".agentos/pnp/verifiers/**"

jobs:
  pnp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run verify:pnp
      - run: node .agentos/runtime/converge.mjs
