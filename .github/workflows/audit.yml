name: AgentOS Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: npm run verify:all
      - run: npm run context:bootstrap
